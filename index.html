  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

80,50,30,.1)\">\n          <span>Standing set<\/span>\n          <span style=\"font:700 11px\/1 'Hanken Grotesk';opacity:.6\">{{ standingDone }}\/6<\/span>\n        <\/button>\n      <\/sc-if>\n    <\/div>\n    <div style=\"font:500 12px\/1.45 'Hanken Grotesk';color:#9A8B7C;margin-top:10px;padding:0 2px\">{{ rationale }}<\/div>\n  <\/header>\n\n  <main style=\"flex:1;padding:16px 16px 8px;display:flex;flex-direction:column;gap:16px\">\n    <sc-for list=\"{{ list }}\" as=\"item\" hint-placeholder-count=\"6\">\n      <div data-screen-label=\"Exercise: {{ item.name }}\" style=\"background:var(--card,#fff);border-radius:24px;padding:14px;box-shadow:0 8px 26px rgba(74,49,30,.07);border:1px solid #F1E8DD;display:flex;flex-direction:column;gap:13px\">\n\n        <sc-if value=\"{{ item.isLying }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:relative;border-radius:17px;overflow:hidden;background:#E9E2D8;width:100%;height:150px\">\n            {{ item.photoEl }}\n            <div style=\"position:absolute;top:11px;left:11px;background:var(--accent,#C2613C);color:#fff;font:700 13px\/1 'Bricolage Grotesque';min-width:26px;height:26px;padding:0 6px;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(120,60,30,.25);z-index:2\">{{ item.n }}<\/div>\n          <\/div>\n        <\/sc-if>\n        <sc-if value=\"{{ item.isStanding }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;border-radius:17px;overflow:hidden;background:#E9E2D8;width:100%;height:240px\">\n            {{ item.photoEl }}\n            <div style=\"position:absolute;top:11px;left:11px;background:var(--accent,#C2613C);color:#fff;font:700 13px\/1 'Bricolage Grotesque';min-width:26px;height:26px;padding:0 6px;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(120,60,30,.25);z-index:2\">{{ item.n }}<\/div>\n          <\/div>\n        <\/sc-if>\n        <\/div>\n\n        <div style=\"display:flex;flex-direction:column;gap:2px\">\n          <div style=\"font:700 17.5px\/1.2 'Bricolage Grotesque';color:#2E2823;letter-spacing:-0.01em\">{{ item.name }}<\/div>\n          <div style=\"font:700 12.5px\/1 'Hanken Grotesk';color:var(--accent,#C2613C);text-transform:uppercase;letter-spacing:.04em;margin-top:2px\">{{ item.dose }}<\/div>\n        <\/div>\n\n        <div style=\"font:400 14px\/1.55 'Hanken Grotesk';color:#6A6056\">{{ item.cue }}<\/div>\n\n        <sc-if value=\"{{ item.dont }}\" hint-placeholder-val=\"x\">\n          <div style=\"display:flex;gap:9px;align-items:flex-start;background:#F7EBD4;border-radius:13px;padding:9px 12px\">\n            <span style=\"font:700 10px\/1.5 'Hanken Grotesk';color:#A77F32;text-transform:uppercase;letter-spacing:.07em;flex:none;padding-top:1px\">Avoid<\/span>\n            <span style=\"font:500 13px\/1.45 'Hanken Grotesk';color:#876A30\">{{ item.dont }}<\/span>\n          <\/div>\n        <\/sc-if>\n\n        <div style=\"border-top:1px solid #F1E8DD;padding-top:13px;display:flex;flex-direction:column;gap:10px\">\n\n          <sc-if value=\"{{ item.notUni }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <sc-if value=\"{{ item.hold }}\" hint-placeholder-val=\"\">\n                <button onclick=\"{{ item.onHold }}\" style=\"flex:none;display:flex;align-items:center;gap:8px;border:1.5px solid #ECD9C9;background:#fff;border-radius:999px;padding:5px 13px 5px 6px;cursor:pointer\">\n                  <span style=\"width:27px;height:27px;border-radius:99px;background:{{ item.holdRingBg }};display:flex;align-items:center;justify-content:center;flex:none\">\n                    <span style=\"width:19px;height:19px;border-radius:99px;background:#fff;display:flex;align-items:center;justify-content:center;font:700 10px\/1 'Hanken Grotesk';color:var(--accent,#C2613C)\">{{ item.holdNum }}<\/span>\n                  <\/span>\n                  <span style=\"font:700 13px\/1 'Hanken Grotesk';color:#2E2823\">Hold<\/span>\n                <\/button>\n              <\/sc-if>\n              <div onclick=\"{{ item.onAdd }}\" style=\"flex:1;display:flex;flex-direction:column;gap:7px;cursor:pointer;min-width:0\">\n                <div style=\"display:flex;align-items:baseline;justify-content:space-between\">\n                  <span style=\"font:600 11px\/1 'Hanken Grotesk';color:#A99A8B;text-transform:uppercase;letter-spacing:.05em\">tap to count<\/span>\n                  <span style=\"font:700 12.5px\/1 'Hanken Grotesk';color:#6A6056\">{{ item.countLabel }}<\/span>\n                <\/div>\n                <div style=\"display:flex;gap:5px;flex-wrap:wrap;align-items:center\">\n                  <sc-for list=\"{{ item.pips }}\" as=\"pip\" hint-placeholder-count=\"10\">\n                    <span style=\"width:10px;height:10px;border-radius:99px;background:{{ pip.color }};transition:background .15s\"><\/span>\n                  <\/sc-for>\n                <\/div>\n              <\/div>\n              <button onclick=\"{{ item.onUndo }}\" style=\"flex:none;width:34px;height:34px;border-radius:10px;border:1.5px solid #ECD9C9;background:#fff;cursor:pointer;font:700 19px\/1 'Hanken Grotesk';color:#A99A8B\">\\u2212<\/button>\n              <button onclick=\"{{ item.onDone }}\" style=\"flex:none;width:46px;height:46px;border-radius:14px;border:1.5px solid {{ item.doneBorder }};background:{{ item.doneBg }};display:flex;align-items:center;justify-content:center;cursor:pointer;font:700 21px\/1 'Hanken Grotesk';color:{{ item.doneColor }};transition:all .15s\">\\u2713<\/button>\n            <\/div>\n          <\/sc-if>\n\n          <sc-if value=\"{{ item.isUni }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between\">\n              <span style=\"font:600 11px\/1 'Hanken Grotesk';color:#A99A8B;text-transform:uppercase;letter-spacing:.05em\">tap to count<\/span>\n              <button onclick=\"{{ item.onDone }}\" style=\"flex:none;width:40px;height:40px;border-radius:13px;border:1.5px solid {{ item.doneBorder }};background:{{ item.doneBg }};display:flex;align-items:center;justify-content:center;cursor:pointer;font:700 19px\/1 'Hanken Grotesk';color:{{ item.doneColor }};transition:all .15s\">\\u2713<\/button>\n            <\/div>\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <span style=\"flex:none;width:18px;text-align:center;font:800 12px\/1 'Bricolage Grotesque';color:#B49684\">L<\/span>\n              <sc-if value=\"{{ item.hasHold }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ item.onHoldL }}\" style=\"flex:none;width:30px;height:30px;border-radius:99px;border:1.5px solid #ECD9C9;background:{{ item.holdRingBgL }};display:flex;align-items:center;justify-content:center;cursor:pointer\">\n                  <span style=\"width:20px;height:20px;border-radius:99px;background:#fff;display:flex;align-items:center;justify-content:center;font:700 9px\/1 'Hanken Grotesk';color:var(--accent,#C2613C)\">{{ item.holdNumL }}<\/span>\n                <\/button>\n              <\/sc-if>\n              <div onclick=\"{{ item.onAddL }}\" style=\"flex:1;display:flex;gap:4px;flex-wrap:wrap;align-items:center;cursor:pointer;min-width:0\">\n                <sc-for list=\"{{ item.pipsL }}\" as=\"pip\" hint-placeholder-count=\"10\">\n                  <span style=\"width:9px;height:9px;border-radius:99px;background:{{ pip.color }};transition:background .15s\"><\/span>\n                <\/sc-for>\n              <\/div>\n              <span style=\"flex:none;font:700 12px\/1 'Hanken Grotesk';color:#6A6056;min-width:40px;text-align:right\">{{ item.cntLabelL }}<\/span>\n              <button onclick=\"{{ item.onUndoL }}\" style=\"flex:none;width:30px;height:30px;border-radius:9px;border:1.5px solid #ECD9C9;background:#fff;cursor:pointer;font:700 17px\/1 'Hanken Grotesk';color:#A99A8B\">\\u2212<\/button>\n            <\/div>\n            <div style=\"display:flex;align-items:center;gap:9px\">\n              <span style=\"flex:none;width:18px;text-align:center;font:800 12px\/1 'Bricolage Grotesque';color:#B49684\">R<\/span>\n              <sc-if value=\"{{ item.hasHold }}\" hint-placeholder-val=\"{{ false }}\">\n                <button onclick=\"{{ item.onHoldR }}\" style=\"flex:none;width:30px;height:30px;border-radius:99px;border:1.5px solid #ECD9C9;background:{{ item.holdRingBgR }};display:flex;align-items:center;justify-content:center;cursor:pointer\">\n                  <span style=\"width:20px;height:20px;border-radius:99px;background:#fff;display:flex;align-items:center;justify-content:center;font:700 9px\/1 'Hanken Grotesk';color:var(--accent,#C2613C)\">{{ item.holdNumR }}<\/span>\n                <\/button>\n              <\/sc-if>\n              <div onclick=\"{{ item.onAddR }}\" style=\"flex:1;display:flex;gap:4px;flex-wrap:wrap;align-items:center;cursor:pointer;min-width:0\">\n                <sc-for list=\"{{ item.pipsR }}\" as=\"pip\" hint-placeholder-count=\"10\">\n                  <span style=\"width:9px;height:9px;border-radius:99px;background:{{ pip.color }};transition:background .15s\"><\/span>\n                <\/sc-for>\n              <\/div>\n              <span style=\"flex:none;font:700 12px\/1 'Hanken Grotesk';color:#6A6056;min-width:40px;text-align:right\">{{ item.cntLabelR }}<\/span>\n              <button onclick=\"{{ item.onUndoR }}\" style=\"flex:none;width:30px;height:30px;border-radius:9px;border:1.5px solid #ECD9C9;background:#fff;cursor:pointer;font:700 17px\/1 'Hanken Grotesk';color:#A99A8B\">\\u2212<\/button>\n            <\/div>\n          <\/sc-if>\n\n          <button onclick=\"{{ item.onResetEx }}\" style=\"align-self:flex-start;background:none;border:none;font:600 11px\/1 'Hanken Grotesk';color:#C4B5A4;cursor:pointer;padding:2px 0;text-decoration:underline;text-underline-offset:2px\">reset this exercise<\/button>\n        <\/div>\n        <\/sc-for><\/main><\/div>\n    \n  \n\n  <footer style=\"padding:8px 20px 30px;display:flex;flex-direction:column;gap:14px\">\n\n    <div style=\"background:var(--card,#fff);border:1px solid #F1E8DD;border-radius:18px;padding:14px 15px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 26px rgba(74,49,30,.06)\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between\">\n        <span style=\"font:700 14px\/1 'Bricolage Grotesque';color:#2E2823\">How did the knees feel today?<\/span>\n        <span style=\"font:600 9.5px\/1 'Hanken Grotesk';color:#A99A8B;text-transform:uppercase;letter-spacing:.03em\">0 none \\u00b7 10 worst<\/span>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <span style=\"font:800 11px\/1 'Bricolage Grotesque';color:#B49684\">LEFT<\/span>\n          <span style=\"font:600 11px\/1 'Hanken Grotesk';color:#9A8B7C\">{{ painLlabel }}<\/span>\n        <\/div>\n        <div style=\"display:flex;gap:3px\">\n          <sc-for list=\"{{ painCellsL }}\" as=\"c\" hint-placeholder-count=\"11\">\n            <button onclick=\"{{ c.onPick }}\" style=\"flex:1;height:30px;border:none;border-radius:8px;background:{{ c.bg }};color:{{ c.color }};font:700 12px\/1 'Hanken Grotesk';cursor:pointer\">{{ c.label }}<\/button>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n      <div style=\"display:flex;flex-direction:column;gap:6px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <span style=\"font:800 11px\/1 'Bricolage Grotesque';color:#B49684\">RIGHT<\/span>\n          <span style=\"font:600 11px\/1 'Hanken Grotesk';color:#9A8B7C\">{{ painRlabel }}<\/span>\n        <\/div>\n        <div style=\"display:flex;gap:3px\">\n          <sc-for list=\"{{ painCellsR }}\" as=\"c\" hint-placeholder-count=\"11\">\n            <button onclick=\"{{ c.onPick }}\" style=\"flex:1;height:30px;border:none;border-radius:8px;background:{{ c.bg }};color:{{ c.color }};font:700 12px\/1 'Hanken Grotesk';cursor:pointer\">{{ c.label }}<\/button>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n      <div style=\"border-top:1px solid #F1E8DD;padding-top:10px;display:flex;flex-direction:column;gap:6px\">\n        <span style=\"font:600 9.5px\/1 'Hanken Grotesk';color:#A99A8B;text-transform:uppercase;letter-spacing:.03em\">Last 7 days \\u00b7 L \/ R<\/span>\n        <div style=\"display:flex;gap:5px\">\n          <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:#F6EEE4;border-radius:9px;padding:6px 2px\">\n              <span style=\"font:700 9px\/1 'Hanken Grotesk';color:#B49684\">{{ h.day }}<\/span>\n              <span style=\"font:700 11px\/1 'Hanken Grotesk';color:#C2613C\">{{ h.L }}<\/span>\n              <span style=\"font:700 11px\/1 'Hanken Grotesk';color:#6A6056\">{{ h.R }}<\/span>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <div style=\"display:flex;gap:10px;align-items:flex-start;background:#F0E5D8;border:1px solid #E3D4C3;border-radius:15px;padding:13px 15px\">\n      <span style=\"font:800 13px\/1 'Bricolage Grotesque';color:#B4533F;flex:none;padding-top:1px\">Stop if<\/span>\n      <span style=\"font:500 12.5px\/1.5 'Hanken Grotesk';color:#7C6F60\">you feel sharp pain (not muscle burn), joint pinching, numbness, or pain radiating down a limb. This program was prescribed after an individual PT assessment \\u2014 have your own clinician clear it before using it for your knees.<\/span>\n    <\/div>\n    <button onclick=\"{{ onReset }}\" style=\"align-self:center;background:none;border:none;font:600 12.5px\/1 'Hanken Grotesk';color:#A99A8B;cursor:pointer;padding:6px 12px;text-decoration:underline;text-underline-offset:3px\">Reset today's progress<\/button>\n  <\/footer>\n\n<\/div>\n\n<\/x-dc>\n<script type=\"text\/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:468,&quot;height&quot;:900},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#E07A55&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  K = 'kneePT_v2';\n  PK = 'kneePT_v2_pain';\n  uniIds = ['l1','l2','l3','l5','l6','s1','s2','s3'];\n  state = { tab: 'lying', counts: {}, done: {}, diagram: {}, hold: {}, streak: 0, best: 0, pain: {} };\n\n  exercises = [\n    { id:'l1', set:'lying', n:1, name:'Active Straight Leg Raise + Quad Set', target:10, unit:'reps', hold:false,\n      cue:'On your back, one knee bent. Squeeze the quad hard \u2014 knee locked straight, foot flexed \u2014 then lift the straight leg to the height of the other thigh and lower slowly.',\n      dont:'Letting the low back arch \u2014 keep it pressed flat.' },\n    { id:'l2', set:'lying', n:2, name:'Straight Leg Raise + External Rotation', target:10, unit:'reps', hold:false,\n      cue:'Same setup. Turn the straight leg outward first, then tighten the quad and lift until level with the other thigh. The turn-out biases the inner quad (VMO).',\n      dont:'Letting the low back arch.' },\n    { id:'l3', set:'lying', n:3, name:'Supine Knee Extension', target:10, unit:'reps', hold:true,\n      cue:'Ball or towel roll under the knee. Contract the quad to straighten the knee and lift the heel, driving the back of the knee down into the roll. Hold, then lower slowly.',\n      dont:'Arching the back to help the lift.' },\n    { id:'l4', set:'lying', n:4, name:'Supine Bridge + Ball Squeeze', target:10, unit:'reps', hold:true,\n      cue:'Knees bent, a ball between the knees. Brace your abs, squeeze the ball, and lift the hips into a bridge. Hold, then lower with control.',\n      dont:'Letting the hips rotate or sag to one side.' },\n    { id:'l5', set:'lying', n:5, name:'Sidelying Hip Abduction', target:10, unit:'reps', hold:false,\n      cue:'On your side, legs straight and stacked. Lift the top leg toward the ceiling with the knee straight; lower slowly.',\n      dont:'Letting the hips roll forward or back.' },\n    { id:'l6', set:'lying', n:6, name:'Clam with Resistance', target:10, unit:'reps', hold:true,\n      cue:'On your side, knees bent, band around the legs, feet together. Brace the abs and lift the top knee like a clam \u2014 feet stay touching. Hold.',\n      dont:'Letting the hip roll backward to cheat.' },\n    { id:'s1', set:'standing', n:1, name:'Standing Hip Abduction', target:10, unit:'reps', hold:false,\n      cue:'One hand on the counter, band at the ankles. Lift one leg straight out to the side against the band, then return slowly.',\n      dont:'Leaning your torso toward the standing leg.' },\n    { id:'s2', set:'standing', n:2, name:'Standing Hip Extension', target:10, unit:'reps', hold:false,\n      cue:'Band at the ankles. Lift one leg straight back and squeeze the glute; return slowly.',\n      dont:'Arching the low back to find more range.' },\n    { id:'s3', set:'standing', n:3, name:'Standing Hip Flexion', target:10, unit:'reps', hold:false,\n      cue:'Band at the ankles. Lift one leg forward with the knee STRAIGHT \u2014 a straight-leg raise, not a knee-up march. Abs tight, stand tall.',\n      dont:'Bending the knee or leaning back.' },\n    { id:'s4', set:'standing', n:4, name:'Side Stepping', target:2, unit:'laps', hold:false,\n      cue:'Band at the ankles, sink into a mini-squat. Step sideways keeping constant band tension, toes pointing forward.',\n      dont:'Letting the knees collapse inward.' },\n    { id:'s5', set:'standing', n:5, name:'Band Walks', target:2, unit:'laps', hold:false,\n      cue:'Band at the ankles, mini-squat. Walk forward one foot at a time with constant band tension, toes forward.',\n      dont:'Dragging the feet or losing band tension.' },\n    { id:'s6', set:'standing', n:6, name:'Forward Monster Walks', target:2, unit:'laps', hold:false,\n      cue:'Band at the ankles, mini-squat. Step diagonally forward, then bring the feet together; alternate sides. Chest upright.',\n      dont:'Letting the knees travel past the toes.' },\n  ];\n\n  componentDidMount() {\n    let d = {};\n    try { d = JSON.parse(localStorage.getItem(this.K)) || {}; } catch (e) {}\n    this.lastDone = d.lastDone || null;\n    this.streak = d.streak || 0;\n    this.best = d.best || 0;\n    let counts = {}, done = {};\n    if (d.date === this.today()) { counts = d.counts || {}; done = d.done || {}; }\n    this.painLog = {};\n    try { this.painLog = JSON.parse(localStorage.getItem(this.PK)) || {}; } catch (e) {}\n    const pain = this.painLog[this.today()] || {};\n    this.setState({ counts, done, streak: this.streak, best: this.best, pain });\n    this._timers = {};\n  }\n    componentWillUnmount() {\n    if (this._timers) Object.values(this._timers).forEach(clearInterval);\n  }\n\n  today() { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  yesterday() { const d = new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n\n  persist() {\n    localStorage.setItem(this.K, JSON.stringify({\n      date: this.today(), counts: this.state.counts, done: this.state.done,\n      lastDone: this.lastDone, streak: this.streak, best: this.best,\n    }));\n  }\n  afterChange() {\n    const lyingAll = this.exercises.filter(e => e.set === 'lying').every(e => this.state.done[e.id]);\n    const standingAll = this.exercises.filter(e => e.set === 'standing').every(e => this.state.done[e.id]);\n    const dayComplete = lyingAll || standingAll;\n    if (dayComplete && this.lastDone !== this.today()) {\n      this.streak = (this.lastDone === this.yesterday()) ? (this.streak || 0) + 1 : 1;\n      this.best = Math.max(this.best || 0, this.streak);\n      this.lastDone = this.today();\n      this.setState({ streak: this.streak, best: this.best });\n    }\n    this.persist();\n  }\n\n  isUni(id) { return this.uniIds.indexOf(id) !== -1; }\n  exById(id) { return this.exercises.find(e => e.id === id); }\n  slotKey(id, side) { return (this.isUni(id) && side) ? id + '|' + side : id; }\n  recomputeDone(id, counts, done) {\n    const ex = this.exById(id);\n    if (this.isUni(id)) {\n      const okL = (counts[id + '|L'] || 0) >= ex.target;\n      const okR = (counts[id + '|R'] || 0) >= ex.target;\n      done[id] = okL && okR;\n    } else {\n      done[id] = (counts[id] || 0) >= ex.target;\n    }\n  }\n\n  addRep(id, side) {\n    this.setState(s => {\n      const ex = this.exById(id);\n      const key = this.slotKey(id, side);\n      const n = Math.min(ex.target, (s.counts[key] || 0) + 1);\n      const counts = { ...s.counts, [key]: n };\n      const done = { ...s.done };\n      this.recomputeDone(id, counts, done);\n      return { counts, done };\n    }, () => this.afterChange());\n  }\n  undoRep(id, side) {\n    this.setState(s => {\n      const key = this.slotKey(id, side);\n      const n = Math.max(0, (s.counts[key] || 0) - 1);\n      const counts = { ...s.counts, [key]: n };\n      const done = { ...s.done };\n      this.recomputeDone(id, counts, done);\n      return { counts, done };\n    }, () => this.afterChange());\n  }\n  resetExercise(id) {\n    this.setState(s => {\n      const counts = { ...s.counts };\n      delete counts[id]; delete counts[id + '|L']; delete counts[id + '|R'];\n      const done = { ...s.done }; delete done[id];\n      return { counts, done };\n    }, () => this.afterChange());\n  }\n  toggleDone(id) {\n    this.setState(s => {\n      const ex = this.exById(id);\n      const nd = !s.done[id];\n      const done = { ...s.done, [id]: nd };\n      const counts = { ...s.counts };\n      if (this.isUni(id)) {\n        counts[id + '|L'] = nd ? ex.target : 0;\n        counts[id + '|R'] = nd ? ex.target : 0;\n      } else {\n        counts[id] = nd ? ex.target : 0;\n      }\n      return { done, counts };\n    }, () => this.afterChange());\n  }\n  toggleView(id) { this.setState(s => ({ diagram: { ...s.diagram, [id]: !s.diagram[id] } })); }\n  startHold(id, side) {\n    this._timers = this._timers || {};\n    const key = this.slotKey(id, side);\n    if (this._timers[key]) return;\n    let remaining = 5;\n    this.setState(s => ({ hold: { ...s.hold, [key]: 5 } }));\n    this._timers[key] = setInterval(() => {\n      remaining = +(remaining - 0.1).toFixed(2);\n      if (remaining <= 0) {\n        clearInterval(this._timers[key]); delete this._timers[key];\n        this.setState(s => { const h = { ...s.hold }; delete h[key]; return { hold: h }; });\n        this.addRep(id, side);\n      } else {\n        this.setState(s => ({ hold: { ...s.hold, [key]: remaining } }));\n      }\n    }, 100);\n  }\n  resetDay() {\n    this.setState({ counts: {}, done: {} }, () => this.persist());\n  }\n  setPain(side, val) {\n    const today = this.today();\n    this.painLog = this.painLog || {};\n    const cur = { ...(this.painLog[today] || {}) };\n    if (cur[side] === val) { delete cur[side]; } else { cur[side] = val; }\n    this.painLog[today] = cur;\n    try { localStorage.setItem(this.PK, JSON.stringify(this.painLog)); } catch (e) {}\n    this.setState({ pain: cur });\n  }\n\n    figFor(id) {\n    const mo = !!this.props.reduceMotion;\n    if (this._mk !== mo) { this._fc = {}; this._mk = mo; }\n    this._fc = this._fc || {};\n    if (this._fc[id]) return this._fc[id];\n    const h = React.createElement;\n    const A = (n) => mo ? 'none' : n;\n    const ln = (x1,y1,x2,y2,extra) => h('line', Object.assign({ x1,y1,x2,y2 }, extra||{}));\n    const hd = (cx,cy) => h('circle', { cx, cy, r:14, fill:'var(--figStroke,#C2613C)', stroke:'none' });\n    const flr = (x1,x2,y) => h('line', { x1, y1:y, x2, y2:y, stroke:'#E7C9B6', strokeWidth:5, strokeLinecap:'round' });\n    const grp = (anim, ox, oy, vars, ...kids) => h('g', { style: Object.assign({ animation: anim, transformBox:'view-box', transformOrigin: ox+'px '+oy+'px' }, vars) }, ...kids);\n    const sw = (s) => A('swing '+s+' ease-in-out infinite');\n    const lyVB = '0 0 250 176', stVB = '0 0 200 224';\n    const svg = (vb, ...parts) => h('svg', {\n      viewBox: vb, preserveAspectRatio:'xMidYMid meet',\n      style: { width:'100%', height:'100%', overflow:'visible', stroke:'var(--figStroke,#C2613C)', strokeWidth:7, strokeLinecap:'round', strokeLinejoin:'round', fill:'none' },\n    }, ...parts);\n\n    let el;\n    switch (id) {\n      case 'l1': el = svg(lyVB,\n        flr(24,232,150), hd(44,118), ln(58,120,150,128), ln(82,124,98,150),\n        ln(150,128,170,98), ln(170,98,154,150),\n        grp(sw('3.4s'),150,128,{'--a':'-34deg'}, ln(150,128,224,134))); break;\n      case 'l2': el = svg(lyVB,\n        flr(24,232,150), hd(44,118), ln(58,120,150,128), ln(82,124,98,150),\n        ln(150,128,170,98), ln(170,98,154,150),\n        grp(sw('3.4s'),150,128,{'--a':'-30deg'}, ln(150,128,222,134), ln(222,134,233,126))); break;\n      case 'l3': el = svg(lyVB,\n        flr(24,232,150), hd(44,118), ln(58,120,150,128), ln(82,124,98,150),\n        ln(150,128,172,150),\n        ln(150,128,196,132),\n        h('circle',{cx:196,cy:140,r:9,fill:'none',stroke:'#E7B7A0',strokeWidth:5}),\n        grp(sw('3.4s'),196,132,{'--a':'-58deg'}, ln(196,132,196,153))); break;\n      case 'l4': el = svg(lyVB,\n        flr(24,232,150),\n        ln(182,120,186,150), ln(202,122,206,150),\n        h('circle',{cx:192,cy:121,r:6,fill:'#F4CDBC',stroke:'none'}),\n        grp(A('liftY 3.2s ease-in-out infinite'),0,0,{'--ty':'-24px'},\n          hd(46,118), ln(60,120,150,126), ln(150,126,182,120), ln(150,126,202,122))); break;\n      case 'l5': el = svg(lyVB,\n        flr(24,232,150), hd(44,116), ln(58,118,150,126), ln(82,122,98,148),\n        ln(150,126,226,140),\n        grp(sw('3.4s'),150,126,{'--a':'-30deg'}, ln(150,126,226,126))); break;\n      case 'l6': el = svg(lyVB,\n        flr(24,232,150), hd(44,116), ln(58,118,138,126), ln(80,122,96,146),\n        ln(138,126,182,150), ln(182,150,152,168),\n        grp(sw('3.2s'),138,126,{'--a':'-26deg'}, ln(138,126,180,144), ln(180,144,150,162))); break;\n      case 's1': el = svg(stVB,\n        flr(52,148,212), hd(100,34), ln(100,48,100,126),\n        ln(100,62,76,104), ln(100,62,124,104),\n        ln(100,126,88,168), ln(88,168,84,210),\n        grp(sw('3.2s'),100,126,{'--a':'36deg'}, ln(100,126,112,168), ln(112,168,116,210))); break;\n      case 's2': el = svg(stVB,\n        flr(70,134,212), ln(150,96,150,162,{stroke:'#E7C9B6',strokeWidth:6}),\n        hd(94,34), ln(96,48,100,126), ln(100,62,146,98),\n        ln(100,126,100,210),\n        grp(sw('3.2s'),100,126,{'--a':'32deg'}, ln(100,126,100,168), ln(100,168,100,210))); break;\n      case 's3': el = svg(stVB,\n        flr(70,134,212), ln(150,96,150,162,{stroke:'#E7C9B6',strokeWidth:6}),\n        hd(94,34), ln(96,48,100,126), ln(100,62,146,98),\n        ln(100,126,100,210),\n        grp(sw('3.2s'),100,126,{'--a':'-44deg'}, ln(100,126,100,168), ln(100,168,100,210))); break;\n      case 's4': el = svg(stVB,\n        flr(48,152,210),\n        grp(A('shiftX 2.8s ease-in-out infinite'),0,0,{'--tx':'22px'},\n          hd(100,38), ln(100,52,100,120), ln(100,64,76,98), ln(100,64,124,98),\n          ln(100,120,80,158), ln(80,158,82,204), ln(100,120,120,158), ln(120,158,118,204),\n          ln(82,204,118,204,{stroke:'var(--accent,#E07A55)',strokeWidth:6}))); break;\n      case 's5': el = svg(stVB,\n        flr(60,140,208), hd(94,36), ln(96,50,100,122), ln(98,64,110,100),\n        grp(A('swingAlt 1.5s ease-in-out infinite'),100,122,{'--a':'18deg'}, ln(100,122,96,166), ln(96,166,96,206)),\n        grp(A('swingAlt 1.5s ease-in-out infinite reverse'),100,122,{'--a':'18deg'}, ln(100,122,104,166), ln(104,166,104,206))); break;\n      case 's6': el = svg(stVB,\n        flr(60,140,208), hd(100,38), ln(102,52,100,124), ln(100,66,116,100),\n        grp(A('swingAlt 1.6s ease-in-out infinite'),100,124,{'--a':'27deg'}, ln(100,124,94,166), ln(94,166,94,206)),\n        grp(A('swingAlt 1.6s ease-in-out infinite reverse'),100,124,{'--a':'27deg'}, ln(100,124,106,166), ln(106,166,106,206)),\n        ln(94,206,106,206,{stroke:'var(--accent,#E07A55)',strokeWidth:6})); break;\n      default: el = svg(stVB, hd(100,40), ln(100,54,100,140));\n    }\n    this._fc[id] = el;\n    return el;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const accent = this.props.accentColor || '#E07A55';\n    const mkpips = (cnt, target) => Array.from({ length: target }, (_, i) => ({ color: i < cnt ? 'var(--accent,#E07A55)' : '#EAD9CB' }));\n    const list = this.exercises.filter(e => e.set === s.tab).map(e => {\n      const uni = this.isUni(e.id);\n      const done = !!s.done[e.id];\n      const base = {\n        ...e,\n        isLying: e.set === 'lying',\n        isStanding: e.set === 'standing',\n        isUni: uni,\n        notUni: !uni,\n        hasHold: !!e.hold,\n        photoEl: React.createElement('img', { src: (typeof window !== 'undefined' && window.__resources && window.__resources['photo_' + e.id]) || ('photos\/' + e.id + '.jpg'), alt: e.name, style: { width: '100%', height: '100%', objectFit: 'contain', display: 'block' } }),\n        dose: e.target + ' ' + e.unit + (uni ? ' \\u00b7 each side' : '') + (e.hold ? ' \\u00b7 5-sec hold' : ''),\n        doneBg: done ? '#6E9C6B' : '#fff',\n        doneColor: done ? '#fff' : '#DCCDBC',\n        doneBorder: done ? '#6E9C6B' : '#ECD9C9',\n        onDone: () => this.toggleDone(e.id),\n        onResetEx: () => this.resetExercise(e.id),\n      };\n      if (uni) {\n        const cntL = s.counts[e.id + '|L'] || 0, cntR = s.counts[e.id + '|R'] || 0;\n        const holdL = s.hold[e.id + '|L'], holdR = s.hold[e.id + '|R'];\n        const hp = (h) => (h != null) ? (5 - h) \/ 5 * 100 : 0;\n        base.cntLabelL = cntL + ' \/ ' + e.target;\n        base.cntLabelR = cntR + ' \/ ' + e.target;\n        base.pipsL = mkpips(cntL, e.target);\n        base.pipsR = mkpips(cntR, e.target);\n        base.onAddL = () => this.addRep(e.id, 'L');\n        base.onAddR = () => this.addRep(e.id, 'R');\n        base.onUndoL = () => this.undoRep(e.id, 'L');\n        base.onUndoR = () => this.undoRep(e.id, 'R');\n        base.onHoldL = () => this.startHold(e.id, 'L');\n        base.onHoldR = () => this.startHold(e.id, 'R');\n        base.holdRingBgL = (holdL != null) ? ('conic-gradient(var(--accent,#E07A55) ' + hp(holdL) + '%, #EAD9CB 0)') : '#EAD9CB';\n        base.holdRingBgR = (holdR != null) ? ('conic-gradient(var(--accent,#E07A55) ' + hp(holdR) + '%, #EAD9CB 0)') : '#EAD9CB';\n        base.holdNumL = (holdL != null) ? Math.ceil(holdL) : 5;\n        base.holdNumR = (holdR != null) ? Math.ceil(holdR) : 5;\n      } else {\n        const cnt = s.counts[e.id] || 0;\n        const hold = s.hold[e.id];\n        const pct = (hold != null) ? (5 - hold) \/ 5 * 100 : 0;\n        base.countLabel = cnt + ' \/ ' + e.target;\n        base.pips = mkpips(cnt, e.target);\n        base.onAdd = () => this.addRep(e.id);\n        base.onUndo = () => this.undoRep(e.id);\n        base.onHold = () => this.startHold(e.id);\n        base.holdRingBg = (hold != null) ? ('conic-gradient(var(--accent,#E07A55) ' + pct + '%, #EAD9CB 0)') : '#EAD9CB';\n        base.holdNum = (hold != null) ? Math.ceil(hold) : 5;\n      }\n      return base;\n    });\n    const doneCount = this.exercises.filter(e => s.done[e.id]).length;\n    const lyingDone = this.exercises.filter(e => e.set === 'lying' && s.done[e.id]).length;\n    const standingDone = this.exercises.filter(e => e.set === 'standing' && s.done[e.id]).length;\n    const mkPainCells = (side) => Array.from({ length: 11 }, (_, v) => ({\n      label: '' + v,\n      onPick: () => this.setPain(side, v),\n      bg: (s.pain && s.pain[side] === v) ? 'var(--accent,#E07A55)' : '#F0E5D8',\n      color: (s.pain && s.pain[side] === v) ? '#fff' : '#9A8B7C',\n    }));\n    const hist = [];\n    for (let i = 6; i >= 0; i--) {\n      const d = new Date(); d.setDate(d.getDate() - i);\n      const key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');\n      const rec = (this.painLog && this.painLog[key]) || {};\n      const lab = ['S', 'M', 'T', 'W', 'T', 'F', 'S'][d.getDay()];\n      const fmt = (x) => (x == null ? '\\u2013' : '' + x);\n      hist.push({ day: lab, L: fmt(rec.L), R: fmt(rec.R) });\n    }\n    const pl = (s.pain && s.pain.L != null) ? s.pain.L : null;\n    const pr = (s.pain && s.pain.R != null) ? s.pain.R : null;\n    return {\n      themeStyle: { '--accent': accent, '--figStroke': accent, '--bg': '#F4ECE3', '--card': '#FFFFFF', minHeight: '100vh' },\n      list,\n      tab: s.tab,\n      doneCount, lyingDone, standingDone,\n      streakNum: s.streak || 0,\n      ringBg: 'conic-gradient(#6E9C6B ' + (doneCount \/ 12 * 100) + '%, #E5D7C9 0)',\n      tabIsLying: s.tab === 'lying',\n      tabIsStanding: s.tab === 'standing',\n      rationale: s.tab === 'lying'\n        ? 'Six lying moves to wake up the quad and glutes and bias VMO \/ kneecap tracking.'\n        : 'Six banded standing moves \\u2014 keep one hand on a counter for balance.',\n      painCellsL: mkPainCells('L'),\n      painCellsR: mkPainCells('R'),\n      painLlabel: (pl == null) ? 'not logged' : (pl + ' \/ 10'),\n      painRlabel: (pr == null) ? 'not logged' : (pr + ' \/ 10'),\n      history: hist,\n      onLying: () => this.setState({ tab: 'lying' }),\n      onStanding: () => this.setState({ tab: 'standing' }),\n      onReset: () => this.resetDay(),\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
